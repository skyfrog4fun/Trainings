name: PR Guardian - Trainings

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-guardian-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr_guardian:
    name: Build/Test/Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Will use global.json automatically if present.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Info
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Restore
        run: dotnet restore

      - name: Build (warnings as errors)
        run: dotnet build -c Release --no-restore /warnaserror

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Format check (verify no changes)
        run: dotnet format --verify-no-changes

      # Warn-only (do not fail the job)
      - name: Package audit (vulnerable + deprecated) - warn only
        run: |
          dotnet list package --vulnerable || true
          dotnet list package --deprecated || true

      - name: PR Guardian report comment (create/update)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha = context.payload.pull_request.head.sha?.substring(0, 7) ?? "unknown";
            const conclusion = (context.runConclusion || "unknown").toUpperCase();

            const marker = "<!-- pr-guardian-report -->";

            const bodyLines = [
              marker,
              "## PR Guardian Report",
              "",
              `- Conclusion: **${conclusion}**`,
              `- Commit: \`${sha}\``,
              `- Workflow run: ${runUrl}`,
              "",
              "What was checked:",
              "- Restore",
              "- Build (`/warnaserror`)",
              "- Unit tests",
              "- Format (`dotnet format --verify-no-changes`)",
              "- Packages (`--vulnerable`, `--deprecated`) *(warn-only; see logs)*",
              "",
              "> Details are in the **Checks** tab and the workflow run logs."
            ];

            const body = bodyLines.join("\n");

            // Find existing comment containing our marker, update it; else create.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.find(c => (c.body || "").includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }
