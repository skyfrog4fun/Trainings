# MariaDB Development Instance – Synology NAS 224+
# Usage: docker-compose -f docker-compose.dev.yml up -d
#
# Runs on port 3307 so it does not conflict with the production instance (3306).
# Before first start, replace all CHANGE_ME_* placeholders with your own passwords.

services:
  mariadb-dev:
    image: mariadb:11.4
    container_name: trainings-mariadb-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: CHANGE_ME_DEV_ROOT_PASSWORD
      MYSQL_DATABASE: trainings_dev
      MYSQL_USER: trainings_dev_user
      MYSQL_PASSWORD: CHANGE_ME_DEV_PASSWORD
    ports:
      - "3307:3306"
    volumes:
      - trainings_dev_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - trainings_dev_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  trainings_dev_data:
    driver: local

networks:
  trainings_dev_net:
    driver: bridge
