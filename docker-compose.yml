# Trainings application stack for Synology NAS deployment
# Place this file in /volume1/docker/trainings/ on the NAS
# Create a .env file in the same directory with the required secrets (see .env.example)

services:
  trainings-web:
    image: ghcr.io/skyfrog4fun/trainings:latest
    container_name: trainings-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/trainings.db
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__User=${SMTP_USER}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__From=${SMTP_FROM}
      - App__BaseUrl=${APP_BASE_URL}
    volumes:
      - /volume1/docker/trainings/data:/app/data
    networks:
      - trainings-net
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro   # Watchtower reads registry credentials from /config.json by default
    environment:
      - WATCHTOWER_CLEANUP=true            # remove old images after update
#      - WATCHTOWER_POLL_INTERVAL=600       # check for updates every 5 minutes
      - WATCHTOWER_SCHEDULE=0 0 3 * * *    # Watchtower extended cron: sec min hour day month weekday (every day at 03:00 AM UTC)
      - WATCHTOWER_INCLUDE_STOPPED=false   # only watch running containers
      - WATCHTOWER_NOTIFICATIONS=shoutrrr  # optional – see Step 5 for notifications
    command: trainings-web                 # only watch this container

networks:
  trainings-net:
    driver: bridge
